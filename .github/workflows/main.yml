name: Agent Enderun CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    - name: Install dependencies
      run: npm install
    - name: Build all packages
      run: npm run enderun:build
    - name: Run unit + integration E2E tests
      run: npm run enderun:test
    - name: Framework health check
      run: node bin/cli.js check
    - name: Verify contract integrity
      run: node bin/update-contract.js
    - name: Lint
      run: npm run lint
